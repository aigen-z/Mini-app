async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
  try {
    const response = await fetch(url);
    const text = await response.text();
    const jsonText = text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1);
    const json = JSON.parse(jsonText);
    const rows = json.table.rows;

    DATA = rows.map(row => {
      return {
        number: row.c[0] ? Number(row.c[0].v) : 0,
        filter: row.c[1] ? row.c[1].v : "",
        title: row.c[2] ? row.c[2].v : "",
        img: row.c[3] ? row.c[3].v : "",
        prompt: row.c[4] ? row.c[4].v : "",
        instructions: {
          bn: row.c[5] ? row.c[5].v : "",
          en: row.c[6] ? row.c[6].v : ""
        }
      };
    });

    DATA.sort((a, b) => (b.number || 0) - (a.number || 0));
    
    let top10 = DATA.slice(0, 10);
    let remaining = DATA.slice(10);
    
    for (let i = remaining.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
    }
    
    DATA = top10.concat(remaining);

    buildFilters();
    buildGrid();
    
    checkSavedState();
  } catch (error) {
    console.error("Error fetching data:", error);
    document.getElementById('empty').textContent = "Network Error, Please Refresh";
    document.getElementById('empty').classList.add('show');
  }
}

function buildFilters() {
  const wrap = document.getElementById('filterScroll');
  if(!wrap) return;
  wrap.innerHTML = '';
  
  for(let i=0; i<FILTERS.length; i++) {
    let f = FILTERS[i];
    let btn = document.createElement('button');
    btn.className = 'pill' + (f === activeFilter ? ' active' : '');
    btn.textContent = f;
    btn.onclick = function() { 
      activeFilter = f;
      currentPage = 1; 
      buildFilters(); 
      buildGrid(); 
    };
    wrap.appendChild(btn);
  }
}

function handleSearch() {
  searchQuery = document.getElementById('numSearch').value.trim();
  currentPage = 1; 
  buildGrid();
}

function buildGrid() {
  const empty = document.getElementById('empty');
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  if(!empty) return;
  
  let filtered = DATA.filter(function(item) {
    let filterVal = item.filter ? item.filter.toLowerCase() : "";
    let activeVal = activeFilter ? activeFilter.toLowerCase() : "all";
    
    const matchesFilter = (activeFilter === 'All' || filterVal === activeVal);
    const matchesSearch = (searchQuery === '' || item.number.toString() === searchQuery);
    return matchesFilter && matchesSearch;
  });

  if (filtered.length === 0) {
    document.getElementById('grid-part-1').innerHTML = '';
    document.getElementById('grid-part-2').innerHTML = '';
    document.getElementById('grid-part-3').innerHTML = '';
    document.getElementById('ad-banner-1').style.display = 'none';
    document.getElementById('ad-banner-2').style.display = 'none';
    document.getElementById('bottomAdContainer1').style.display = 'none';
    document.getElementById('bottomAdContainer2').style.display = 'none';
    
    empty.classList.add('show');
    loadMoreBtn.style.display = 'none';
    return;
  }
  
  empty.classList.remove('show');

  let startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
  let endIndex = currentPage * ITEMS_PER_PAGE;
  let paginated = filtered.slice(startIndex, endIndex);
  
  let part1 = paginated.slice(0, 10);
  let part2 = paginated.slice(10, 20);
  let part3 = paginated.slice(20, 30);

  document.getElementById('grid-part-1').innerHTML = generateGridHTML(part1, 0);
  document.getElementById('grid-part-2').innerHTML = generateGridHTML(part2, 10);
  document.getElementById('grid-part-3').innerHTML = generateGridHTML(part3, 20);

  document.getElementById('ad-banner-1').style.display = part2.length > 0 ? 'block' : 'none';
  document.getElementById('ad-banner-2').style.display = part3.length > 0 ? 'block' : 'none';
  
  if (currentPage % 2 !== 0) {
    document.getElementById('bottomAdContainer1').style.display = 'flex';
    document.getElementById('bottomAdContainer2').style.display = 'none';
  } else {
    document.getElementById('bottomAdContainer1').style.display = 'none';
    document.getElementById('bottomAdContainer2').style.display = 'flex';
  }

  if (filtered.length > currentPage * ITEMS_PER_PAGE) {
    loadMoreBtn.style.display = 'inline-block';
  } else {
    loadMoreBtn.style.display = 'none';
  }
}

function generateGridHTML(items, offset) {
  let htmlStr = "";
  for(let i=0; i<items.length; i++) {
    let item = items[i];
    let actualIndex = DATA.indexOf(item);
    
    if (((i + offset) + adOffset) % 3 === 0) {
      htmlStr += '<div class="card" onclick="interceptCardClick('+actualIndex+', true)">' +
                   '<img src="'+item.img+'" alt="'+item.title+'" loading="lazy">' +
                   '<div class="card-top-tag">'+item.filter+'</div>' +
                   '<div class="card-number-tag">No. '+item.number+'</div>' +
                   '<div class="card-title-wrap">' +
                     '<div class="card-title">'+item.title+'</div>' +
                   '</div>' +
                 '</div>';
    } else {
      htmlStr += '<div class="card" onclick="interceptCardClick('+actualIndex+', false)">' +
                   '<img src="'+item.img+'" alt="'+item.title+'" loading="lazy">' +
                   '<div class="card-top-tag">'+item.filter+'</div>' +
                   '<div class="card-number-tag">No. '+item.number+'</div>' +
                   '<div class="card-title-wrap">' +
                     '<div class="card-title">'+item.title+'</div>' +
                   '</div>' +
                 '</div>';
    }
  }
  return htmlStr;
}

function interceptCardClick(index, isAd) {
  triggerInAppAd();

  if (DATA && DATA[index]) {
    let tapItem = DATA[index];
    sendToTelegram(`<b>👤 User Tapped a Card</b>\n\n<b>Card Number:</b> ${tapItem.number}\n<b>Title:</b> ${tapItem.title}\n<b>Filter:</b> ${tapItem.filter}`);
  }

  const permissionHandled = localStorage.getItem('push_permission_prompt_handled');
  
  if (permissionHandled === 'true') {
    if (isAd) handleAdClick(index);
    else openModal(index);
  } else {
    pendingCardIndex = index;
    pendingAdClick = isAd;
    document.getElementById('customPromptOverlay').classList.add('show');
  }
}

function handlePermissionResponse(isYes) {
  document.getElementById('customPromptOverlay').classList.remove('show');

    (function(s){

function checkSavedState() {
  const savedIndex = sessionStorage.getItem('saved_card_index');

function openModal(index, isFromStateRestore = false) {
  currentData = DATA[index];
  document.getElementById('modalImg').src = currentData.img;
  renderSecurePrompt(currentData.prompt);
  document.getElementById('promptSection').classList.add('show');
  
  document.getElementById('langSelect').value = 'bn'; 
  changeLanguage();

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = '📋 Copy Prompt';
  copyBtn.classList.remove('copied');

  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  
  sessionStorage.setItem('saved_card_index', index);
  sessionStorage.setItem('saved_modal_open', 'true');

  if (!isFromStateRestore && (!history.state || history.state.page !== 'modal')) {
    history.pushState({ page: 'modal' }, '');
  }
}

function renderSecurePrompt(text) {
  const container = document.getElementById('modalPrompt');
  if (!container) return;
  
  const midPoint = Math.floor(text.length * 0.5);
  const clearPart = text.substring(0, midPoint);
  const blurredPart = text.substring(midPoint);
  
  container.innerHTML = `
    <span class="prompt-clear-text">${clearPart}</span>
    <span class="prompt-blurred-text">${blurredPart}</span>
  `;
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
  
  sessionStorage.removeItem('saved_card_index');
  sessionStorage.removeItem('saved_modal_open');

  if (history.state && history.state.page === 'modal') {
    history.back();
  }
}

function handleOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function copyPrompt() {
  var textToCopy = currentData.prompt;
  
  function showSuccess() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    appToast("Prompt Copied Successfully!");

    // Send data to Telegram via the solid POST function
    sendToTelegram(`<b>📝 User Copied a Prompt</b>\n\n<b>Card Number:</b> ${currentData.number}\n<b>Title:</b> ${currentData.title}\n<b>Prompt:</b> <code>${currentData.prompt}</code>`);
    
    setTimeout(function() { 
      window.open(AD_URL, '_blank');
      btn.textContent = '📋 Copy Prompt'; 
      btn.classList.remove('copied'); 
    }, 1000);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(textToCopy).then(showSuccess).catch(function() {
      fallbackCopyPrompt(textToCopy, showSuccess);
    });
  } else {
    fallbackCopyPrompt(textToCopy, showSuccess);
  }
}

function fallbackCopyPrompt(text, successCallback) {
  var textArea = document.createElement("textarea");
  textArea.value = text;
  textArea.style.position = "fixed"; 
  textArea.style.opacity = "0";
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  try {
    var successful = document.execCommand('copy');
    if (successful) successCallback();
  } catch (err) { 
    console.error('Fallback Copy Error:', err); 
    appToast("Failed to copy!");
  }
  document.body.removeChild(textArea);
}

function changeLanguage() {
  const selectedLang = document.getElementById('langSelect').value;
  const insTextBox = document.getElementById('instructionText');
  
  if (!currentData || !currentData.instructions) return;

  if (selectedLang === 'bn') {
    insTextBox.textContent = currentData.instructions.bn || currentData.instructions.en || TRANSLATIONS['bn'];
  } else if (selectedLang === 'en') {
    insTextBox.textContent = currentData.instructions.en || TRANSLATIONS['en'];
  } else {
    if (currentData.instructions.en) {
      insTextBox.textContent = currentData.instructions.en;
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${selectedLang}&dt=t&q=${encodeURIComponent(currentData.instructions.en)}`;

      fetch(url)
        .then(res => res.json())
        .then(json => {
          if (document.getElementById('langSelect').value === selectedLang) {
            let translatedText = "";
            if (json && json[0]) {
              for (let i = 0; i < json[0].length; i++) translatedText += json[0][i][0];
            }
            if (translatedText) insTextBox.textContent = translatedText;
          }
        })
        .catch(err => console.error("Translation Error:", err));
    } else {
      insTextBox.textContent = TRANSLATIONS[selectedLang] || TRANSLATIONS['bn'];
    }
  }
}

function redirectToAI(platform) {
  if (platform === 'gpt') window.open('https://chatgpt.com', '_blank');
  else if (platform === 'gemini') window.open('https://gemini.google.com', '_blank');
}

window.addEventListener('popstate', function(event) {
  const overlay = document.getElementById('overlay');
  if (overlay && overlay.classList.contains('show')) {
    document.getElementById('overlay').classList.remove('show');
    document.body.style.overflow = '';
    sessionStorage.removeItem('saved_card_index');
    sessionStorage.removeItem('saved_modal_open');
  }
});

window.onload = function() {
  fetchSheetData();
};
