async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
  try {
    const response = await fetch(url);
    const text = await response.text();
    const jsonText = text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1);
    const json = JSON.parse(jsonText);
    
    let filterSet = new Set(["All"]);
    DATA = json.table.rows.map(row => {
      let filter = row.c[1] ? row.c[1].v : "";
      if (filter) filterSet.add(filter);
      return {
        number: row.c[0] ? Number(row.c[0].v) : 0,
        filter: filter,
        title: row.c[2] ? row.c[2].v : "",
        img: row.c[3] ? row.c[3].v : "",
        prompt: row.c[4] ? row.c[4].v : "",
        instructions: { bn: row.c[5] ? row.c[5].v : "", en: row.c[6] ? row.c[6].v : "" }
      };
    });

    FILTERS = Array.from(filterSet);
    DATA.sort((a, b) => (b.number || 0) - (a.number || 0));
    
    let top10 = DATA.slice(0, 10);
    let remaining = DATA.slice(10);
    for (let i = remaining.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
    }
    DATA = top10.concat(remaining);

    buildFilters();
    buildGrid();
    checkSavedState();
  } catch (error) {
    document.getElementById('empty').textContent = "Network Error. Check connection.";
    document.getElementById('empty').classList.add('show');
  }
}

function buildFilters() {
  const wrap = document.getElementById('filterScroll');
  if(!wrap) return;
  wrap.innerHTML = '';
  for(let f of FILTERS) {
    let btn = document.createElement('button');
    btn.className = 'pill' + (f === activeFilter ? ' active' : '');
    btn.textContent = f;
    btn.onclick = function() { activeFilter = f; currentPage = 1; buildFilters(); buildGrid(); };
    wrap.appendChild(btn);
  }
}

function handleSearch() {
  searchQuery = document.getElementById('numSearch').value.trim();
  currentPage = 1; buildGrid();
}

function buildGrid() {
  const empty = document.getElementById('empty');
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  
  let filtered = DATA.filter(item => {
    let matchesFilter = (activeFilter === 'All' || (item.filter && item.filter.toLowerCase() === activeFilter.toLowerCase()));
    let matchesSearch = (searchQuery === '' || item.number.toString() === searchQuery);
    return matchesFilter && matchesSearch;
  });

  if (filtered.length === 0) {
    document.getElementById('grid-part-1').innerHTML = '';
    document.getElementById('grid-part-2').innerHTML = '';
    document.getElementById('grid-part-3').innerHTML = '';
    document.getElementById('ad-banner-1').style.display = 'none';
    document.getElementById('ad-banner-2').style.display = 'none';
    empty.classList.add('show'); loadMoreBtn.style.display = 'none'; return;
  }
  
  empty.classList.remove('show');
  let startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
  let endIndex = currentPage * ITEMS_PER_PAGE;
  let paginated = filtered.slice(startIndex, endIndex);
  
  let part1 = paginated.slice(0, 10);
  let part2 = paginated.slice(10, 20);
  let part3 = paginated.slice(20, 30);

  document.getElementById('grid-part-1').innerHTML = generateGridHTML(part1);
  document.getElementById('grid-part-2').innerHTML = generateGridHTML(part2);
  document.getElementById('grid-part-3').innerHTML = generateGridHTML(part3);

  document.getElementById('ad-banner-1').style.display = part2.length > 0 ? 'block' : 'none';
  document.getElementById('ad-banner-2').style.display = part3.length > 0 ? 'block' : 'none';

  loadMoreBtn.style.display = (filtered.length > currentPage * ITEMS_PER_PAGE) ? 'inline-block' : 'none';
}

function generateGridHTML(items) {
  let htmlStr = "";
  for(let item of items) {
    let actualIndex = DATA.indexOf(item);
    htmlStr += `<div class="card" onclick="interceptCardClick(${actualIndex})">
                 <img src="${item.img}" alt="${item.title}" loading="lazy">
                 <div class="card-top-tag">${item.filter}</div>
                 <div class="card-number-tag">No. ${item.number}</div>
                 <div class="card-title-wrap"><div class="card-title">${item.title}</div></div>
               </div>`;
  }
  return htmlStr;
}


// ==========================================
// 4. EVERY CARD TAP: TRIGGER IN-APP AD THEN SHOW MODAL
// ==========================================
function interceptCardClick(index) {
  if (DATA && DATA[index]) {
    let tapItem = DATA[index];
    sendToTelegram(`<b>👤 User Tapped a Card</b>\n\n<b>Card Number:</b> ${tapItem.number}\n<b>Title:</b> ${tapItem.title}\n<b>Filter:</b> ${tapItem.filter}`);
  }

  // First check if the ad SDK is loaded and available
  if (typeof show_11138107 === 'function') {
    try {
      // Trigger the Ad
      let adPromise = show_11138107({
        type: 'inApp',
        inAppSettings: {
          frequency: 2,
          capping: 0.1,
          interval: 30,
          timeout: 5,
          everyPage: false
        }
      });
      
      // If the SDK returns a promise, wait for the ad to close, then open the modal
      if (adPromise && typeof adPromise.then === 'function') {
        adPromise
          .then(() => openModal(index))
          .catch(() => openModal(index));
      } else {
        // Fallback if ad displays without a promise 
        openModal(index);
      }
    } catch(e) {
      // Safety catch: open modal even if ad fails to execute
      openModal(index);
    }
  } else {
    // If ad blocker blocked the ad script entirely, just open the modal directly
    openModal(index);
  }
}


function checkSavedState() {
  const savedIndex = sessionStorage.getItem('saved_card_index');
  const modalWasOpen = sessionStorage.getItem('saved_modal_open');
  if (savedIndex !== null && modalWasOpen === 'true' && DATA[savedIndex]) {
    openModal(parseInt(savedIndex), true);
  }
}

function loadMore() {
  currentPage++; buildGrid();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openModal(index, isFromStateRestore = false) {
  currentData = DATA[index];
  document.getElementById('modalImg').src = currentData.img;
  renderSecurePrompt(currentData.prompt);
  document.getElementById('promptSection').classList.add('show');
  document.getElementById('langSelect').value = 'bn'; changeLanguage();

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = '📋 Copy Prompt'; copyBtn.classList.remove('copied');

  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  
  sessionStorage.setItem('saved_card_index', index);
  sessionStorage.setItem('saved_modal_open', 'true');

  if (!isFromStateRestore && (!history.state || history.state.page !== 'modal')) {
    history.pushState({ page: 'modal' }, '');
  }
}

function renderSecurePrompt(text) {
  const midPoint = Math.floor(text.length * 0.5);
  document.getElementById('modalPrompt').innerHTML = `
    <span class="prompt-clear-text">${text.substring(0, midPoint)}</span>
    <span class="prompt-blurred-text">${text.substring(midPoint)}</span>
  `;
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
  sessionStorage.removeItem('saved_card_index');
  sessionStorage.removeItem('saved_modal_open');
  if (history.state && history.state.page === 'modal') history.back();
}

function handleOverlay(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function copyPrompt() {
  var text = currentData.prompt;
  var btn = document.getElementById('copyBtn');
  
  const success = () => {
    btn.textContent = '✓ Copied!'; btn.classList.add('copied');
    appToast("Prompt Copied Successfully!");
    
    // টেলিগ্রামে প্রম্পট কপি হওয়ার নোটিফিকেশন পাঠানো
    sendToTelegram(`<b>📝 User Copied a Prompt</b>\n\n<b>Card Number:</b> ${currentData.number}\n<b>Title:</b> ${currentData.title}\n<b>Prompt:</b> <code>${currentData.prompt}</code>`);
    
    setTimeout(() => { btn.textContent = '📋 Copy Prompt'; btn.classList.remove('copied'); }, 2000);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(success).catch(() => fallbackCopyPrompt(text, success));
  } else {
    fallbackCopyPrompt(text, success);
  }
}

function fallbackCopyPrompt(text, successCallback) {
  var t = document.createElement("textarea");
  t.value = text; t.style.position = "fixed"; t.style.opacity = "0";
  document.body.appendChild(t); t.focus(); t.select();
  try { if(document.execCommand('copy')) successCallback(); } 
  catch(e) { appToast("Failed to copy!"); }
  document.body.removeChild(t);
}

function changeLanguage() {
  const lang = document.getElementById('langSelect').value;
  const box = document.getElementById('instructionText');
  if (!currentData || !currentData.instructions) return;

  if (lang === 'bn') { box.textContent = currentData.instructions.bn || currentData.instructions.en || TRANSLATIONS['bn']; } 
  else if (lang === 'en') { box.textContent = currentData.instructions.en || TRANSLATIONS['en']; } 
  else {
    if (currentData.instructions.en) {
      fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(currentData.instructions.en)}`)
        .then(r => r.json()).then(j => {
          if (document.getElementById('langSelect').value === lang && j && j[0]) {
            box.textContent = j[0].map(x => x[0]).join('');
          }
        }).catch(() => box.textContent = TRANSLATIONS[lang] || TRANSLATIONS['bn']);
    } else {
      box.textContent = TRANSLATIONS[lang] || TRANSLATIONS['bn'];
    }
  }
}

function redirectToAI(p) { window.open(p === 'gpt' ? 'https://chatgpt.com' : 'https://gemini.google.com', '_blank'); }

window.addEventListener('popstate', function() {
  const o = document.getElementById('overlay');
  if (o && o.classList.contains('show')) {
    o.classList.remove('show'); document.body.style.overflow = '';
    sessionStorage.removeItem('saved_card_index'); sessionStorage.removeItem('saved_modal_open');
  }
});

window.onload = fetchSheetData;
</script>
